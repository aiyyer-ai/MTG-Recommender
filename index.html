<!DOCTYPE html>
<html id="html">

<head>
      <meta charset="utf-8" />

      <!-- To Do: Come up with Good Name -->
      <title>Commander Tag Recommender</title>
      <!-- To Do: Come up with Good Name -->

      <!-- References -->
      <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
      <div class="flexContainer gapForJesus" id="allData">
            <div class="flexContainer column" id="mainData">
                  <div class="flexContainer" id="urlInputContainer">
                        <div class="input-container urlDiv" id="inputDiv">
                              <label for="urlInput">URL</label>
                              <input type="text" id="urlInput" name="deckURL"
                                    placeholder="Deck Link (Archidekt, Moxfield)">
                              <div class="input-bg"></div>
                        </div>
                  </div>
                  <div class="flexContainer" id="errorText"></div>
                  <div class="flexContainer" id="titleSection">
                        <div class="flexContainer column" id="commanderTagAndImage">
                              <div class="flexContainer" id="commanderData"></div>
                              <div class="flexContainer column centeredFlex" id="commanderTagsTitle"></div>
                              <div class="flexContainer column centeredFlex" id="commanderTags"></div>
                        </div>
                        <div class="flexContainer column" id="graphData"></div>
                  </div>
            </div>
            <div class="flexContainer column centeredFlex" id="sideData"></div>
      </div>
      <script src="script.js"></script>
</body>

</html>
